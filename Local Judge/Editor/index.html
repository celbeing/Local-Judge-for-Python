<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <title>Local Judge Monaco Editor</title>

    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #1e1e1e;
        }

        #editor {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="editor"></div>

    <script src="./monaco/vs/loader.js"></script>
    <script>
        require.config({
            paths: {
                vs: "./monaco/vs"
            }
        });
    </script>

    <script src="./editorHost.js"></script>
</body>
</html>
